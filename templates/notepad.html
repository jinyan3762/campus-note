{% extends "base.html" %}
{% block content %}
<div id="page-notepad" class="page-container" style="display:none;">
    <div class="card">
        <div class="card-header">
            <h2>📝 校园记事本</h2>
            <button class="btn btn-primary btn-sm" onclick="showCreateNote()">新建笔记</button>
        </div>
        <div class="search-bar">
            <input type="text" id="note-search" class="form-input" placeholder="🔍 搜索笔记..." oninput="searchNotes()">
        </div>
        <div class="notes-grid" id="notes-grid">
            <p style="color:var(--text-muted);text-align:center;grid-column:1/-1;">加载中...</p>
        </div>
    </div>
</div>
{% endblock %}
